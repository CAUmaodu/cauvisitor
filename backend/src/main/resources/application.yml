server:


  port: 8081
  servlet:                  # 🔥 新增这一行
    context-path: /cauvisitor # 🔥 新增这一行

# 高德 Web 服务 Key（路径规划）。也可通过环境变量 AMAP_KEY 覆盖
amap:
  key: 8f9f62a6e4edc9fc7a5d1d3e5e8bf886



#数据库配置

spring:
  datasource:
    #alibaba数据连接池
    type: com.alibaba.druid.pool.DruidDataSource
    #postgresql驱动
    driverClassName: org.postgresql.Driver
    #数据库地址、账号、密码
    url: jdbc:postgresql://localhost:5432/cau_db
    username: postgres
    password: maodu123
    druid:
      #初始化连接大小
      initial-size: 8
      #最小空闲连接数
      min-idle: 5
      #最大连接数
      max-active: 10
      #查询超时时间
      query-timeout: 6000
      #事务查询超时时间
      transaction-query-timeout: 6000
      #关闭空闲连接超时时间
      remove-abandoned-timeout: 1800
      filters: stat,config



mybatis:
  # 扫描自定义TypeHandler包
  type-handlers-package: com.campus.vistorservice.handler


  #sql映射文件

  mapper-locations: classpath:mapper/*.xml

  #model

  #   type-aliases-package: com.campus.vistorservice.model
  #   type-handlers-package: com.campus.vistorservice.mybatis  # 新增：扫描类型处理器

  configuration:
    # 开启驼峰命名自动转换
    map-underscore-to-camel-case: true
    # 显示SQL日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl





